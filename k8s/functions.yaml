apiVersion: apps/v1
kind: Deployment
metadata:
  name: function-a
  namespace: serverless-tracing
  labels:
    app: function-a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: function-a
  template:
    metadata:
      labels:
        app: function-a
    spec:
      containers:
      - name: function-a
        image: ebpf-serverless/function-a:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8082
        env:
        - name: FUNCTION_A_PORT
          value: "8082"
        - name: FUNCTION_B_URL
          value: "http://function-b:8083/payment"
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 3
          periodSeconds: 5
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: function-a
  namespace: serverless-tracing
  labels:
    app: function-a
spec:
  type: ClusterIP
  selector:
    app: function-a
  ports:
  - name: http
    port: 8082
    targetPort: 8082
    protocol: TCP
---
