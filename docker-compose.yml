services:
  nats:
    image: nats:2.10-alpine
    container_name: tracing-nats
    ports:
      - "4222:4222"
      - "6222:6222"
      - "8222:8222"
    command:
      - "--name"
      - "tracing-nats"
      - "--js"
      - "--sd"
      - "/data"
      - "--http_port"
      - "8222"
      - "--max_payload"
      - "8MB"
      - "--max_connections"
      - "1024"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8222/healthz | grep -q ok"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    volumes:
      - nats-data:/data
    networks:
      - tracing-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: tracing-elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - cluster.name=tracing-cluster
      - node.name=es-node-1
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    sysctls:
      - vm.max_map_count=262144
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - tracing-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: tracing-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=kibana
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q '\"overall\":{\"level\":\"available\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - tracing-net

  nats-stream-init:
    image: natsio/nats-box:0.14.1
    container_name: tracing-nats-init
    depends_on:
      nats:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Waiting for NATS JetStream...'
        sleep 3
        nats --server nats:4222 str add TRACES \
          --subjects 'trace.spans.>' \
          --storage file \
          --replicas 1 \
          --retention limits \
          --max-msgs=-1 \
          --max-bytes=-1 \
          --max-age 168h \
          --discard old \
          --dupe-window 2m \
          --max-msg-size=-1 \
          --max-consumers=-1 \
          --allow-rollup \
          --deny-delete \
          --deny-purge \
          || echo 'Stream may already exist, continuing...'
        nats --server nats:4222 con add TRACES es-consumer \
          --filter 'trace.spans.>' \
          --deliver all \
          --ack explicit \
          --ack-wait 30s \
          --max-deliver 5 \
          --max-pending 1000 \
          --replay instant \
          --pull \
          || echo 'Consumer may already exist, continuing...'
        echo 'NATS JetStream initialized'
        nats --server nats:4222 str ls
      "
    networks:
      - tracing-net

  function-a:
    build:
      context: .
      dockerfile: docker/Dockerfile.function-a
    container_name: tracing-function-a
    depends_on:
      nats-stream-init:
        condition: service_completed_successfully
      chaos-manager:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      - FUNCTION_A_PORT=8082
      - FUNCTION_B_URL=http://function-b:8083/payment
      - NATS_URL=nats://nats:4222
      - NATS_STREAM=TRACES
      - TRACE_USE_NATS=true
      - WASM_PLUGIN_DIR=/plugins/wasm
      - CHAOS_SERVICE_NAME=function-a
      - CHAOS_MANAGER_URL=http://chaos-manager:8088
    volumes:
      - wasm-plugins:/plugins/wasm
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tracing-net
    restart: on-failure

  function-b:
    build:
      context: .
      dockerfile: docker/Dockerfile.function-b
    container_name: tracing-function-b
    depends_on:
      nats-stream-init:
        condition: service_completed_successfully
      chaos-manager:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      - FUNCTION_B_PORT=8083
      - FUNCTION_C_URL=http://function-c:8084/notify
      - NATS_URL=nats://nats:4222
      - NATS_STREAM=TRACES
      - TRACE_USE_NATS=true
      - CHAOS_SERVICE_NAME=function-b
      - CHAOS_MANAGER_URL=http://chaos-manager:8088
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tracing-net
    restart: on-failure

  function-c:
    build:
      context: .
      dockerfile: docker/Dockerfile.function-c
    container_name: tracing-function-c
    depends_on:
      nats-stream-init:
        condition: service_completed_successfully
      chaos-manager:
        condition: service_healthy
    ports:
      - "8084:8084"
    environment:
      - FUNCTION_C_PORT=8084
      - NATS_URL=nats://nats:4222
      - NATS_STREAM=TRACES
      - TRACE_USE_NATS=true
      - CHAOS_SERVICE_NAME=function-c
      - CHAOS_MANAGER_URL=http://chaos-manager:8088
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8084/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - tracing-net
    restart: on-failure

  api-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    container_name: tracing-gateway
    depends_on:
      function-a:
        condition: service_healthy
      function-b:
        condition: service_healthy
      function-c:
        condition: service_healthy
      chaos-manager:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - GATEWAY_PORT=8080
      - FUNCTION_A_URL=http://function-a:8082/order
      - FUNCTION_B_URL=http://function-b:8083/payment
      - FUNCTION_C_URL=http://function-c:8084/notify
      - NATS_URL=nats://nats:4222
      - NATS_STREAM=TRACES
      - TRACE_USE_NATS=true
      - WASM_PLUGIN_DIR=/plugins/wasm
      - CHAOS_SERVICE_NAME=gateway
      - CHAOS_MANAGER_URL=http://chaos-manager:8088
    volumes:
      - wasm-plugins:/plugins/wasm
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tracing-net
    restart: on-failure

  nats-producer:
    build:
      context: .
      dockerfile: docker/Dockerfile.nats-producer
    container_name: tracing-nats-producer
    depends_on:
      nats-stream-init:
        condition: service_completed_successfully
    ports:
      - "8085:8085"
    environment:
      - NATS_PRODUCER_PORT=8085
      - NATS_URLS=nats://nats:4222
      - NATS_STREAM=TRACES
      - WASM_PLUGIN_DIR=/plugins/wasm
    volumes:
      - wasm-plugins:/plugins/wasm
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - tracing-net
    restart: on-failure

  nats-consumer:
    build:
      context: .
      dockerfile: docker/Dockerfile.nats-consumer
    container_name: tracing-nats-consumer
    depends_on:
      elasticsearch:
        condition: service_healthy
      nats-stream-init:
        condition: service_completed_successfully
    ports:
      - "8086:8086"
    environment:
      - NATS_CONSUMER_PORT=8086
      - NATS_URLS=nats://nats:4222
      - NATS_STREAM=TRACES
      - NATS_CONSUMER=es-consumer
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ES_INDEX=trace-spans
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - tracing-net
    restart: on-failure

  query-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.query-api
    container_name: tracing-query-api
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      - QUERY_API_PORT=8081
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ES_INDEX=trace-spans
    volumes:
      - ./web:/app/web:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - tracing-net
    restart: on-failure

  chaos-manager:
    build:
      context: .
      dockerfile: docker/Dockerfile.chaos-manager
    container_name: tracing-chaos-manager
    ports:
      - "8088:8088"
    environment:
      - CHAOS_MANAGER_PORT=8088
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8088/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tracing-net
    restart: on-failure

  ai-predictor:
    build:
      context: .
      dockerfile: docker/Dockerfile.ai-predictor
    container_name: tracing-ai-predictor
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "8087:8087"
    environment:
      - PREDICTOR_PORT=8087
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ES_INDEX=trace-spans
      - PREDICT_INTERVAL=30
      - TIMEOUT_THRESHOLD_MS=1000
      - ALERT_THRESHOLD=0.7
      - DINGTALK_WEBHOOK=${DINGTALK_WEBHOOK:-}
      - DINGTALK_SECRET=${DINGTALK_SECRET:-}
      - FEISHU_WEBHOOK=${FEISHU_WEBHOOK:-}
      - FEISHU_SECRET=${FEISHU_SECRET:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8087/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - tracing-net
    restart: on-failure

  trace-generator:
    image: curlimages/curl:8.6.0
    container_name: tracing-generator
    depends_on:
      api-gateway:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo 'Trace Generator started - sending test requests every 5 seconds...'
        echo 'You can also send custom requests with:'
        echo '  curl -X POST http://localhost:8080/api/order -H \"Content-Type: application/json\" -d \"{\\\"product_id\\\":\\\"P001\\\",\\\"amount\\\":99.99,\\\"user_id\\\":\\\"U001\\\"}\"'
        echo ''
        while true; do
          REQ_ID=$$(cat /proc/sys/kernel/random/uuid 2>/dev/null || echo $$RANDOM-$$RANDOM-$$RANDOM)
          AMOUNT=$$(( (RANDOM % 900) + 100 )).$$(( RANDOM % 100 ))
          PRODUCT_ID=PROD-$$RANDOM
          USER_ID=USER-$$RANDOM
          echo \"[$(date +%H:%M:%S)] Generating trace: $${REQ_ID} (amount=$$AMOUNT)\"
          curl -s -X POST http://api-gateway:8080/api/order \
            -H 'Content-Type: application/json' \
            -H \"X-Request-ID: $${REQ_ID}\" \
            -d \"{\\\"product_id\\\":\\\"$${PRODUCT_ID}\\\",\\\"amount\\\":$$AMOUNT,\\\"user_id\\\":\\\"$${USER_ID}\\\"}\" \
            -w ' -> HTTP %{http_code}\n' || echo 'Request failed, will retry...'
          sleep 5
        done
      "
    networks:
      - tracing-net
    restart: always

volumes:
  nats-data:
    driver: local
  es-data:
    driver: local
  wasm-plugins:
    driver: local

networks:
  tracing-net:
    driver: bridge
    name: tracing-network
