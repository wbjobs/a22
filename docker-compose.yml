services:
  zookeeper:
    image: bitnami/zookeeper:3.9
    container_name: tracing-zookeeper
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_TICK_TIME=2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "zkServer.sh", "status"]
      interval: 10s
      timeout: 10s
      retries: 3
    networks:
      - tracing-net

  kafka:
    image: bitnami/kafka:3.6
    container_name: tracing-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,INTERNAL://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,INTERNAL://localhost:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_NUM_PARTITIONS=6
      - KAFKA_CFG_DEFAULT_REPLICATION_FACTOR=1
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - tracing-net

  kafka-rest-proxy:
    image: confluentinc/cp-kafka-rest:7.5.0
    container_name: tracing-kafka-rest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      - KAFKA_REST_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_REST_HOST_NAME=kafka-rest-proxy
      - KAFKA_REST_LISTENERS=http://0.0.0.0:8082
    networks:
      - tracing-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: tracing-elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - cluster.name=tracing-cluster
      - node.name=es-node-1
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    sysctls:
      - vm.max_map_count=262144
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 10s
      timeout: 10s
      retries: 10
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - tracing-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: tracing-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=kibana
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q '\"overall\":{\"level\":\"available\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - tracing-net

  kafka-topic-init:
    image: bitnami/kafka:3.6
    container_name: tracing-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        echo 'Waiting for Kafka to be ready...' &&
        sleep 5 &&
        kafka-topics.sh --create --if-not-exists --topic trace-spans --bootstrap-server kafka:9092 --partitions 6 --replication-factor 1 --config retention.ms=604800000 &&
        echo 'Topic trace-spans created successfully'
      "
    networks:
      - tracing-net

  function-a:
    build:
      context: .
      dockerfile: docker/Dockerfile.function-a
    container_name: tracing-function-a
    depends_on:
      kafka-topic-init:
        condition: service_completed_successfully
    ports:
      - "8082:8082"
    environment:
      - FUNCTION_A_PORT=8082
      - FUNCTION_B_URL=http://function-b:8083/payment
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracing-net
    restart: on-failure

  function-b:
    build:
      context: .
      dockerfile: docker/Dockerfile.function-b
    container_name: tracing-function-b
    depends_on:
      kafka-topic-init:
        condition: service_completed_successfully
    ports:
      - "8083:8083"
    environment:
      - FUNCTION_B_PORT=8083
      - FUNCTION_C_URL=http://function-c:8084/notify
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracing-net
    restart: on-failure

  function-c:
    build:
      context: .
      dockerfile: docker/Dockerfile.function-c
    container_name: tracing-function-c
    depends_on:
      kafka-topic-init:
        condition: service_completed_successfully
    ports:
      - "8084:8084"
    environment:
      - FUNCTION_C_PORT=8084
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8084/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracing-net
    restart: on-failure

  api-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    container_name: tracing-gateway
    depends_on:
      function-a:
        condition: service_healthy
      function-b:
        condition: service_healthy
      function-c:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - GATEWAY_PORT=8080
      - FUNCTION_A_URL=http://function-a:8082/order
      - FUNCTION_B_URL=http://function-b:8083/payment
      - FUNCTION_C_URL=http://function-c:8084/notify
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracing-net
    restart: on-failure

  kafka-producer:
    build:
      context: .
      dockerfile: docker/Dockerfile.kafka-producer
    container_name: tracing-kafka-producer
    depends_on:
      kafka-topic-init:
        condition: service_completed_successfully
    ports:
      - "8085:8085"
    environment:
      - KAFKA_PRODUCER_PORT=8085
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=trace-spans
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracing-net
    restart: on-failure

  es-consumer:
    build:
      context: .
      dockerfile: docker/Dockerfile.es-consumer
    container_name: tracing-es-consumer
    depends_on:
      elasticsearch:
        condition: service_healthy
      kafka-topic-init:
        condition: service_completed_successfully
    ports:
      - "8086:8086"
    environment:
      - ES_CONSUMER_PORT=8086
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=trace-spans
      - KAFKA_GROUP_ID=trace-consumer-group-docker
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ES_INDEX=trace-spans
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - tracing-net
    restart: on-failure

  query-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.query-api
    container_name: tracing-query-api
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      - QUERY_API_PORT=8081
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ES_INDEX=trace-spans
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - tracing-net
    restart: on-failure

  trace-generator:
    image: curlimages/curl:8.6.0
    container_name: tracing-generator
    depends_on:
      api-gateway:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo 'Trace Generator started - sending test requests every 5 seconds...'
        while true; do
          REQ_ID=$$(cat /proc/sys/kernel/random/uuid 2>/dev/null || echo $$RANDOM-$$RANDOM)
          echo \"[$(date)] Generating trace request: $${REQ_ID}\"
          curl -s -X POST http://api-gateway:8080/api/order \
            -H 'Content-Type: application/json' \
            -H \"X-Request-ID: $${REQ_ID}\" \
            -d '{\"product_id\":\"TEST-'$$RANDOM'\",\"amount\":'$$(( (RANDOM % 900) + 100 ))'.'$$(( RANDOM % 100 ))',\"user_id\":\"USER-'$$RANDOM'\"}' \
            -w ' -> HTTP %{http_code}\\n' || echo 'Request failed'
          sleep 5
        done
      "
    networks:
      - tracing-net
    restart: always

volumes:
  es-data:
    driver: local

networks:
  tracing-net:
    driver: bridge
    name: tracing-network
